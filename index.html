<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ร้านขายตุ๊กตา</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: linear-gradient(180deg, #ffe6f2, #fff5fb);
}

header {
  background: linear-gradient(90deg, #ff85c1, #ff69b4);
  color: white;
  padding: 20px;
  display: flex;
  justify-content: space-between;
}

.products {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 40px;
  flex-wrap: wrap;
}

.card {
  background: white;
  width: 230px;
  border-radius: 25px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(255,105,180,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 190px;
  object-fit: cover;
  border-radius: 20px;
}

.card p {
  color: #ff4da6;
  font-weight: bold;
}

button {
  background: #ff69b4;
  border: none;
  padding: 10px 18px;
  color: white;
  border-radius: 25px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
}
</style>

</head>
<body>

<header>
  <h1>🧸 ร้านขายตุ๊กตา</h1>
  <div>ตะกร้า (0)</div>
</header>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1583337130417-3346a1d3fbb0">
    <h3>ตุ๊กตาหมี</h3>
    <p>299 บาท</p>
    <button>เพิ่มลงตะกร้า</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1616628182506-7f1b0a2f4a8a">
    <h3>ตุ๊กตากระต่าย</h3>
    <p>249 บาท</p>
    <button>เพิ่มลงตะกร้า</button>
  </div>

</div>

</body>
</html>
